<script type="text/javascript">
  RED.nodes.registerType('s2-cem-config', {
    category: 'config',
    defaults: {
      name: { value: '' },
      url: { value: '', required: true }
    },
    credentials: {
      username: { type: 'text' },
      password: { type: 'password' }
    },
    label: function () {
      return this.name || this.url || 's2-cem-config'
    }
  })
</script>

<script type="text/html" data-template-name="s2-cem-config">
  <div class="s2-form">

    <div class="form-row">
      <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
      <input type="text" id="node-config-input-name" placeholder="Name (optional)">
    </div>

    <div class="form-row">
      <label for="node-config-input-url">
        <i class="fa fa-globe"></i> CEM URL
        <i class="fa fa-info-circle tooltip-icon" data-tooltip="WebSocket URL of the CEM. Either use {resourceId} as a placeholder (e.g. wss://cem.example.com/s2/{resourceId}) or end the URL with a trailing slash and the Resource ID will be appended automatically (e.g. wss://cem.example.com/s2/ws/)."></i>
      </label>
      <input type="text" id="node-config-input-url" placeholder="wss://cem.example.com/s2/ws/">
    </div>

    <div class="form-row">
      <label for="node-config-input-username"><i class="fa fa-user"></i> Username</label>
      <input type="text" id="node-config-input-username" placeholder="Username (optional)">
    </div>

    <div class="form-row">
      <label for="node-config-input-password"><i class="fa fa-lock"></i> Password</label>
      <input type="password" id="node-config-input-password" placeholder="Password (optional)">
    </div>

  </div>
</script>

<link rel="stylesheet" href="resources/node-red-contrib-s2/s2-styles.css">

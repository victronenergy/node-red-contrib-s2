name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect, and what actually happened?
      placeholder: "Expected: ...\nActual: ..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: input
    id: versions
    attributes:
      label: Versions (node-red-contrib-s2 / Node-RED / Node.js)
      placeholder: "0.0.1 / 4.1.x / 24.x"
    validations:
      required: true
